name: Test pull_request_target secret access

on:
  pull_request_target:
    types: [opened]

jobs:
  test-secret-access:
    runs-on: ubuntu-latest
    steps:
      - name: Check if secret is accessible
        run: |
          if [ -n "${{ secrets.PROJECT_WRITE_PAT }}" ]; then
            echo "::warning::SECRET IS ACCESSIBLE from fork PR!"
            echo "Secret length: ${#SECRET_VAL}"
          else
            echo "Secret is NOT accessible (safe)"
          fi
        env:
          SECRET_VAL: ${{ secrets.PROJECT_WRITE_PAT }}
